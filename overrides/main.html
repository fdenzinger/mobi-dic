{% extends "base.html" %}

{% block scripts %}
  {{ super() }}
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // Version + licence badges – top right of header
      var opts = document.querySelector('.md-header__options');
      if (opts) {
        var lic = document.createElement('span');
        lic.className = 'md-header-badge md-header-badge--proprietary';
        lic.textContent = 'Proprietary';
        opts.insertBefore(lic, opts.firstChild);

        var ver = document.createElement('span');
        ver.className = 'md-header-badge md-header-badge--version';
        ver.textContent = 'v{{ config.extra.app_version }}';
        opts.insertBefore(ver, opts.firstChild);
      }

    });
  </script>
{% endblock %}
